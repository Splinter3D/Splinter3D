name: Build and Release

on:
  push:
    branches:
    - main
    - feat/create_exe
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # vcpkg, system tools
      - name: Install dependencies
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File ./.github/workflows/scripts/Windows/install.ps1 ${{ github.workspace }}

      # creates staging/output for .zip
      - name: Build package
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File ./.github/workflows/scripts/Windows/build.ps1 ${{ github.workspace }}

      - name: Verify package exists
        shell: pwsh
        run: |
          $zip = Join-Path ${{ github.workspace }} 'output\release-package.zip'
          if (Test-Path $zip) { Write-Host "Found package: $zip" } else { Write-Error 'release-package.zip not found'; exit 1 }

      - name: Create Release and upload assets (softprops action)
        uses: softprops/action-gh-release@v1
        with:
          files: |
            output/release-package.zip
            output/release-package.zip.sha256
          tag_name: windows-package-${{ github.run_number }}
          name: windows-package-${{ github.run_number }}
          body: |
            Automated build: windows-package-${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
