name: prepare-release-pr

on:
  pull_request_target:
    branches:
      - dev
      - main
    types:
      - closed
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch to prepare a release PR for"
        required: true
        type: choice
        options:
          - dev
          - main
      tag:
        description: "Optional explicit tag (vX.Y.Z or vX.Y.Z-rc.N)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: prepare-release-${{ github.event_name == 'workflow_dispatch' && inputs.target_branch || github.event.pull_request.base.ref }}
  cancel-in-progress: false

jobs:
  prepare-dev-release-pr:
    if: >-
      (github.event_name == 'pull_request_target' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'dev' &&
      github.event.pull_request.head.ref != 'release/dev' &&
      github.event.pull_request.head.ref != 'main' &&
      !startsWith(github.event.pull_request.head.ref, 'dependabot/')) ||
      (github.event_name == 'workflow_dispatch' &&
      inputs.target_branch == 'dev')
    runs-on: ubuntu-22.04
    environment: dev

    steps:
      - name: Check out dev
        uses: actions/checkout@v7
        with:
          ref: dev
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install release tooling
        run: python -m pip install --upgrade pip commitizen

      - name: Prepare release branch
        id: prepare
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [[ -n "${INPUT_TAG:-}" ]]; then
            tag="${INPUT_TAG}"
            if [[ ! "$tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)(-rc\.([0-9]+))$ ]]; then
              echo "Tag '$tag' does not match required dev format v<MAJOR>.<MINOR>.<PATCH>-rc.<N>" >&2
              exit 1
            fi
          else
            tag="$(./.github/workflows/scripts/next-tag.sh rc)"
          fi
          version="${tag#v}"
          release_branch="release/dev"

          cz changelog --unreleased-version="$tag"
          ./scripts/check-versions.sh --fix "$tag"
          git add CHANGELOG.md vcpkg.json

          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "release_branch=$release_branch" >> "$GITHUB_OUTPUT"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
            echo "title=chore(release): ${version}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$release_branch"
          git commit -m "chore(release): ${version}"
          git push --force-with-lease origin HEAD:"$release_branch"

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "release_branch=$release_branch" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "title=chore(release): ${version}" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Open or update release PR
        if: steps.prepare.outputs.has_changes == 'true'
        run: |
          repo="${{ github.repository }}"
          api_url="https://api.github.com/repos/${repo}/pulls"

          existing_pr="$(curl --silent \
            --url "${api_url}?state=open&head=${{ github.repository_owner }}:${HEAD_BRANCH}&base=${BASE_BRANCH}" \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28")"

          payload="$(python3 - <<'PY'
          import json
          import os

          print(json.dumps({
              "title": os.environ["TITLE"],
              "head": os.environ["HEAD_BRANCH"],
              "base": os.environ["BASE_BRANCH"],
              "body": os.environ["BODY"],
          }))
          PY
          )"

          pr_number="$(printf '%s' "$existing_pr" | sed -n 's/.*"number":[[:space:]]*\([0-9][0-9]*\).*/\1/p' | head -1)"
          if [[ -n "$pr_number" ]]; then
            echo "Updating existing release PR #${pr_number}."
            curl --fail-with-body \
              --request PATCH \
              --url "${api_url}/${pr_number}" \
              --header "Authorization: Bearer ${GITHUB_TOKEN}" \
              --header "Accept: application/vnd.github+json" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              --data "$payload"
            exit 0
          fi

          curl --fail-with-body \
            --request POST \
            --url "$api_url" \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data "$payload"
        env:
          BASE_BRANCH: dev
          BODY: |
            Release preparation PR for `dev`.

            Release tag: `${{ steps.prepare.outputs.tag }}`
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_BRANCH: ${{ steps.prepare.outputs.release_branch }}
          TITLE: ${{ steps.prepare.outputs.title }}

  prepare-main-release-pr:
    if: >-
      (github.event_name == 'pull_request_target' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.ref != 'hotfix/release-main') ||
      (github.event_name == 'workflow_dispatch' &&
      inputs.target_branch == 'main')
    runs-on: ubuntu-22.04
    environment: production

    steps:
      - name: Check out main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install release tooling
        run: python -m pip install --upgrade pip commitizen

      - name: Prepare release branch
        id: prepare
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [[ -n "${INPUT_TAG:-}" ]]; then
            tag="${INPUT_TAG}"
            if [[ ! "$tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              echo "Tag '$tag' does not match required main format v<MAJOR>.<MINOR>.<PATCH>" >&2
              exit 1
            fi
          else
            tag="$(./.github/workflows/scripts/next-tag.sh stable)"
          fi
          version="${tag#v}"
          release_branch="hotfix/release-main"

          cz changelog --unreleased-version="$tag"
          ./scripts/check-versions.sh --fix "$tag"
          git add CHANGELOG.md vcpkg.json

          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "release_branch=$release_branch" >> "$GITHUB_OUTPUT"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
            echo "title=chore(release): ${version}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$release_branch"
          git commit -m "chore(release): ${version}"
          git push --force-with-lease origin HEAD:"$release_branch"

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "release_branch=$release_branch" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "title=chore(release): ${version}" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Open or update release PR
        if: steps.prepare.outputs.has_changes == 'true'
        run: |
          repo="${{ github.repository }}"
          api_url="https://api.github.com/repos/${repo}/pulls"

          existing_pr="$(curl --silent \
            --url "${api_url}?state=open&head=${{ github.repository_owner }}:${HEAD_BRANCH}&base=${BASE_BRANCH}" \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28")"

          payload="$(python3 - <<'PY'
          import json
          import os

          print(json.dumps({
              "title": os.environ["TITLE"],
              "head": os.environ["HEAD_BRANCH"],
              "base": os.environ["BASE_BRANCH"],
              "body": os.environ["BODY"],
          }))
          PY
          )"

          pr_number="$(printf '%s' "$existing_pr" | sed -n 's/.*"number":[[:space:]]*\([0-9][0-9]*\).*/\1/p' | head -1)"
          if [[ -n "$pr_number" ]]; then
            echo "Updating existing release PR #${pr_number}."
            curl --fail-with-body \
              --request PATCH \
              --url "${api_url}/${pr_number}" \
              --header "Authorization: Bearer ${GITHUB_TOKEN}" \
              --header "Accept: application/vnd.github+json" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              --data "$payload"
            exit 0
          fi

          curl --fail-with-body \
            --request POST \
            --url "$api_url" \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data "$payload"
        env:
          BASE_BRANCH: main
          BODY: |
            Release preparation PR for `main`.

            Release tag: `${{ steps.prepare.outputs.tag }}`
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_BRANCH: ${{ steps.prepare.outputs.release_branch }}
          TITLE: ${{ steps.prepare.outputs.title }}
