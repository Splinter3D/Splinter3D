name: Build Windows package (staging)

on:
  workflow_dispatch:

jobs:
  build-package:
    name: Build & Package on Windows
    permissions:
      contents: write
      packages: write
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure PowerShell script is executable
        run: |
          if (-not (Test-Path ./scripts/build-and-package.ps1)) {
            Write-Host "Warning: scripts/build-and-package.ps1 not found. Add the script to repo before running the workflow."
          } else {
            Write-Host "build-and-package.ps1 exists"
          }
        shell: pwsh

      - name: Run build-and-package (staging)
        if: always()
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/build-and-package.ps1 \
            -OutDir "${{ runner.temp }}\output" \
            -VcpkgDir "${{ runner.temp }}\vcpkg"
        shell: pwsh

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: ${{ runner.temp }}\output

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: windows-package-${{ github.run_number }}
          release_name: windows-package-${{ github.run_number }}
          draft: false
          prerelease: false

      - name: Upload ZIP to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ runner.temp }}/output/release-package.zip
          asset_name: release-package.zip
          asset_content_type: application/zip

      - name: Upload SHA256 to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ runner.temp }}/output/release-package.zip.sha256
          asset_name: release-package.zip.sha256
          asset_content_type: text/plain
