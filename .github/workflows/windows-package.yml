name: Build Windows package

on:
  push:
    branches:
      - feat/create_exe
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  check-windows-build:
    name: Check Windows install & build
    runs-on: windows-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Preparing the environment for build: bootstrapped vcpkg, integrated it, imported the MSVC environment, and installed all manifest dependencies
      - name: Run install.ps1
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File ./.github/workflows/scripts/install.ps1 ${{ github.workspace }}
        shell: pwsh

      # Building .zip package with .exe and trads
      - name: Run build.ps1 (configure & build)
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File ./.github/workflows/scripts/build.ps1 ${{ github.workspace }}
        shell: pwsh

      - name: Verify package
        run: |
          $zip = Join-Path ${{ github.workspace }} 'output\release-package.zip'
          if (Test-Path $zip) { Write-Host "Found package: $zip" } else { Write-Error "release-package.zip not found in output"; exit 1 }
        shell: pwsh

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: output

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: windows-package-${{ github.run_number }}
          release_name: windows-package-${{ github.run_number }}
          draft: false
          prerelease: false

      - name: Upload ZIP to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ github.workspace }}\output\release-package.zip
          asset_name: release-package.zip
          asset_content_type: application/zip

      - name: Upload SHA256 to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ github.workspace }}\output\release-package.zip.sha256
          asset_name: release-package.zip.sha256
          asset_content_type: text/plain
