name: CI Linux

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to package (defaults to latest)"
        required: false

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Determine release tag
        id: release_tag
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          tag=""
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          elif [[ -n "${INPUT_TAG}" ]]; then
            tag="${INPUT_TAG}"
          else
            git fetch --tags --force
            tag=$(git describe --tags "$(git rev-list --tags --max-count=1)" 2>/dev/null || true)
          fi

          if [[ -z "${tag}" ]]; then
            echo "No tag found to package" >&2
            exit 1
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Using tag: ${tag}"

      - name: Install dependencies
        shell: bash
        run: |
          ./.github/workflows/scripts/Linux/install.sh ${{ github.workspace }}

      - name: Build and package
        shell: bash
        run: |
          ./.github/workflows/scripts/Linux/build.sh ${{ github.workspace }}

      - name: Verify package exists
        shell: bash
        run: |
          package=$(ls output/splinter3D-*-linux-x64.tar.xz 2>/dev/null | head -1)
          if [ -z "$package" ]; then
            echo "ERROR: No Linux package found"
            exit 1
          fi
          echo "Found package: $package"
          ls -lh "$package" "$(dirname "$package")"/$(basename "$package").sha256

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            output/splinter3D-*-linux-x64.tar.xz
            output/splinter3D-*-linux-x64.tar.xz.sha256
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: ${{ steps.release_tag.outputs.tag }}
          body: |
            Automated build for tag ${{ steps.release_tag.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
