name: CI Linux

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        shell: bash
        run: |
          ./.github/workflows/scripts/Linux/install.sh ${{ github.workspace }}

      - name: Build and package
        shell: bash
        run: |
          ./.github/workflows/scripts/Linux/build.sh ${{ github.workspace }}

      - name: Verify package exists
        shell: bash
        run: |
          package=$(ls output/splinter3D-*-linux-x64.tar.xz 2>/dev/null | head -1)
          if [ -z "$package" ]; then
            echo "ERROR: No Linux package found"
            exit 1
          fi
          echo "Found package: $package"
          ls -lh "$package" "$(dirname "$package")"/$(basename "$package").sha256

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            output/splinter3D-*-linux-x64.tar.xz
            output/splinter3D-*-linux-x64.tar.xz.sha256
          tag_name: linux-package-${{ github.run_number }}
          name: linux-package-${{ github.run_number }}
          body: |
            Automated Linux build: linux-package-${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
