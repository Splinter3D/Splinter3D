name: CI Release (matrix)

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.release_tag.outputs.tag }}
      is_prerelease: ${{ steps.release_tag.outputs.is_prerelease }}
      docker_tag: ${{ steps.release_tag.outputs.docker_tag }}
      version_tag: ${{ steps.release_tag.outputs.version_tag }}
      image_name: ${{ steps.image_name.outputs.image_name }}
      environment_name: ${{ steps.environment.outputs.environment_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release tag
        id: release_tag
        shell: bash
        run: |
          tag=""
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            echo "This workflow only supports tag push events" >&2
            exit 1
          fi

          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag '${tag}' does not match required SemVer format v<MAJOR>.<MINOR>.<PATCH>[ -prerelease ][ +build ]" >&2
            exit 1
          fi

          version_tag="${tag#v}"
          docker_tag="${version_tag%%+*}"
          is_prerelease="false"
          if [[ "${docker_tag}" == *-* ]]; then
            is_prerelease="true"
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${is_prerelease}" >> "$GITHUB_OUTPUT"
          echo "docker_tag=${docker_tag}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${version_tag}" >> "$GITHUB_OUTPUT"
          echo "Using tag: ${tag}"

      - name: Determine Docker image name
        id: image_name
        shell: bash
        run: |
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "image_name=${image_name}" >> "$GITHUB_OUTPUT"
          echo "Using image: ${image_name}"

      - name: Determine deployment environment
        id: environment
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          git fetch origin main dev --depth=1

          remote_branches="$(git branch -r --contains "${RELEASE_TAG}^{commit}" | sed 's/^[*[:space:]]*//')"
          environment_name=""

          if printf '%s\n' "${remote_branches}" | grep -qx 'origin/main'; then
            environment_name="production"
          elif printf '%s\n' "${remote_branches}" | grep -qx 'origin/dev'; then
            environment_name="dev"
          else
            echo "Tagged commit for ${RELEASE_TAG} is not reachable from origin/main or origin/dev" >&2
            exit 1
          fi

          echo "environment_name=${environment_name}" >> "$GITHUB_OUTPUT"
          echo "Using environment: ${environment_name}"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os_name: linux-x64
            runs_on: ubuntu-22.04
            shell: bash
            submodules: true
            install_command: ./.github/workflows/scripts/Linux/install.sh "$WORKSPACE"
            build_command: |
              ./scripts/build.sh --ci
              bash ./.github/workflows/scripts/Linux/package-linux.sh
            verify_command: |
              package=$(ls output/splinter3D-*-linux-x64.tar.xz 2>/dev/null | head -1)
              if [ -z "$package" ]; then
                echo "ERROR: No Linux package found"
                exit 1
              fi
              echo "Found package: $package"
              ls -lh "$package" "$package".sha256
            package_glob: output/splinter3D-*-linux-x64.tar.xz
            sha_glob: output/splinter3D-*-linux-x64.tar.xz.sha256
            artifact_name: splinter3d-linux-x64
          - os_name: linux-arm64
            runs_on: ubuntu-24.04-arm
            shell: bash
            submodules: true
            install_command: ./.github/workflows/scripts/Linux/install.sh "$WORKSPACE"
            build_command: |
              ./scripts/build.sh --ci
              bash ./.github/workflows/scripts/Linux/package-linux.sh
            verify_command: |
              package=$(ls output/splinter3D-*-linux-arm64.tar.xz 2>/dev/null | head -1)
              if [ -z "$package" ]; then
                echo "ERROR: No Linux ARM64 package found"
                exit 1
              fi
              echo "Found package: $package"
              ls -lh "$package" "$package".sha256
            package_glob: output/splinter3D-*-linux-arm64.tar.xz
            sha_glob: output/splinter3D-*-linux-arm64.tar.xz.sha256
            artifact_name: splinter3d-linux-arm64
          - os_name: macos-arm64
            runs_on: macos-latest
            shell: bash
            submodules: true
            install_command: ./.github/workflows/scripts/MacOS/install.sh "$WORKSPACE"
            build_command: |
              ./scripts/build.sh --ci
              bash ./.github/workflows/scripts/MacOS/package-macos.sh
            verify_command: |
              package=$(ls output/splinter3D-*-macos-arm64.dmg 2>/dev/null | head -1)
              if [ -z "$package" ]; then
                echo "ERROR: No macOS package found"
                exit 1
              fi
              echo "Found package: $package"
              ls -lh "$package" "$package".sha256
            package_glob: output/splinter3D-*-macos-arm64.dmg
            sha_glob: output/splinter3D-*-macos-arm64.dmg.sha256
            artifact_name: splinter3d-macos-arm64
          - os_name: macos-x64
            runs_on: macos-26-intel
            shell: bash
            submodules: true
            install_command: ./.github/workflows/scripts/MacOS/install.sh "$WORKSPACE"
            build_command: |
              ./scripts/build.sh --ci
              bash ./.github/workflows/scripts/MacOS/package-macos.sh
            verify_command: |
              package=$(ls output/splinter3D-*-macos-x64.dmg 2>/dev/null | head -1)
              if [ -z "$package" ]; then
                echo "ERROR: No macOS package found"
                exit 1
              fi
              echo "Found package: $package"
              ls -lh "$package" "$package".sha256
            package_glob: output/splinter3D-*-macos-x64.dmg
            sha_glob: output/splinter3D-*-macos-x64.dmg.sha256
            artifact_name: splinter3d-macos-x64
          - os_name: windows-x64
            runs_on: windows-latest
            shell: pwsh
            submodules: false
            install_command: pwsh -NoProfile -ExecutionPolicy Bypass -File ./.github/workflows/scripts/Windows/install.ps1 $env:WORKSPACE
            build_command: |
              pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/build.ps1 --ci
              pwsh -NoProfile -ExecutionPolicy Bypass -File ./.github/workflows/scripts/Windows/package-windows.ps1 -ProjectRoot $env:WORKSPACE
            verify_command: |
              $zip = Get-ChildItem -Path "$env:WORKSPACE/output" -Filter 'splinter3D-*-windows-x64.zip' -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($zip) {
                Write-Host "Found package: $($zip.FullName)"
                Write-Host "Package size: $($zip.Length) bytes"
              } else {
                Write-Error 'No splinter3D-*-windows-x64.zip package found'
                exit 1
              }
            package_glob: output/splinter3D-*-windows-x64.zip
            sha_glob: output/splinter3D-*-windows-x64.zip.sha256
            artifact_name: splinter3d-windows-x64
          - os_name: windows-arm64
            runs_on: windows-11-arm
            shell: pwsh
            submodules: false
            install_command: pwsh -NoProfile -ExecutionPolicy Bypass -File ./.github/workflows/scripts/Windows/install.ps1 $env:WORKSPACE
            build_command: |
              pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/build.ps1 --ci
              pwsh -NoProfile -ExecutionPolicy Bypass -File ./.github/workflows/scripts/Windows/package-windows.ps1 -ProjectRoot $env:WORKSPACE
            verify_command: |
              $zip = Get-ChildItem -Path "$env:WORKSPACE/output" -Filter 'splinter3D-*-windows-arm64.zip' -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($zip) {
                Write-Host "Found package: $($zip.FullName)"
                Write-Host "Package size: $($zip.Length) bytes"
              } else {
                Write-Error 'No splinter3D-*-windows-arm64.zip package found'
                exit 1
              }
            package_glob: output/splinter3D-*-windows-arm64.zip
            sha_glob: output/splinter3D-*-windows-arm64.zip.sha256
            artifact_name: splinter3d-windows-arm64
    uses: ./.github/workflows/reusable-build.yml
    with:
      tag: ${{ needs.prepare.outputs.tag }}
      runs_on: ${{ matrix.runs_on }}
      shell: ${{ matrix.shell }}
      submodules: ${{ matrix.submodules }}
      install_command: ${{ matrix.install_command }}
      build_command: ${{ matrix.build_command }}
      verify_command: ${{ matrix.verify_command }}
      package_glob: ${{ matrix.package_glob }}
      sha_glob: ${{ matrix.sha_glob }}
      artifact_name: ${{ matrix.artifact_name }}
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
      apple_dev_id_cert_b64: ${{ secrets.APPLE_DEV_ID_CERT_B64 }}
      apple_dev_id_cert_pwd: ${{ secrets.APPLE_DEV_ID_CERT_PWD }}
      apple_team_id: ${{ secrets.APPLE_TEAM_ID }}
      apple_dev_id_identity: ${{ secrets.APPLE_DEV_ID_IDENTITY }}
      notary_key_b64: ${{ secrets.NOTARY_KEY_B64 }}
      notary_key_id: ${{ secrets.NOTARY_KEY_ID }}
      notary_issuer_id: ${{ secrets.NOTARY_ISSUER_ID }}

  docker-build:
    needs: [prepare, build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: ubuntu-22.04
            platform: linux/amd64
            arch_suffix: amd64
          - runs_on: ubuntu-24.04-arm
            platform: linux/arm64
            arch_suffix: arm64
    runs-on: ${{ matrix.runs_on }}
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish native Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          tags: |
            ${{ needs.prepare.outputs.image_name }}:${{ needs.prepare.outputs.docker_tag }}-${{ matrix.arch_suffix }}
            ${{ needs.prepare.outputs.image_name }}:sha-${{ github.sha }}-${{ matrix.arch_suffix }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: [prepare, build, docker-build]
    runs-on: ubuntu-22.04
    environment: ${{ needs.prepare.outputs.environment_name }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: output

      - name: List artifacts
        run: ls -R output

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v1
        with:
          files: output/**/*
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          body: |
            Automated build for tag ${{ needs.prepare.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch Docker manifest
        env:
          IMAGE_NAME: ${{ needs.prepare.outputs.image_name }}
          DOCKER_TAG: ${{ needs.prepare.outputs.docker_tag }}
          IS_PRERELEASE: ${{ needs.prepare.outputs.is_prerelease }}
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:${DOCKER_TAG}" \
            "${IMAGE_NAME}:${DOCKER_TAG}-amd64" \
            "${IMAGE_NAME}:${DOCKER_TAG}-arm64"

          if [[ "${IS_PRERELEASE}" != "true" ]]; then
            docker buildx imagetools create \
              --tag "${IMAGE_NAME}:latest" \
              "${IMAGE_NAME}:${DOCKER_TAG}-amd64" \
              "${IMAGE_NAME}:${DOCKER_TAG}-arm64"
          fi
