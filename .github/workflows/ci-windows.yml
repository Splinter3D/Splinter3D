name: CI Windows

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to package (defaults to latest)"
        required: false

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release tag
        id: release_tag
        shell: pwsh
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          $tag = ''

          if ($env:GITHUB_EVENT_NAME -eq 'push' -and $env:GITHUB_REF_TYPE -eq 'tag') {
            $tag = $env:GITHUB_REF_NAME
          } elseif (-not [string]::IsNullOrEmpty($env:INPUT_TAG)) {
            $tag = $env:INPUT_TAG
          } else {
            git fetch --tags --force | Out-Null
            $latest = git rev-list --tags --max-count=1
            if ($latest) {
              $tag = git describe --tags $latest 2>$null
            }
          }

          if (-not $tag) {
            Write-Error 'No tag found to package'
            exit 1
          }

          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Using tag: $tag"

      # vcpkg, system tools
      - name: Install dependencies
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File ./.github/workflows/scripts/Windows/install.ps1 ${{ github.workspace }}

      # creates staging/output for .zip
      - name: Build and package
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File ./.github/workflows/scripts/Windows/build.ps1 ${{ github.workspace }}

      - name: Verify package exists
        shell: pwsh
        run: |
          $zip = Get-ChildItem -Path ${{ github.workspace }}/output -Filter 'splinter3D-*-windows-*.zip' -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($zip) {
            Write-Host "Found package: $($zip.FullName)"
            Write-Host "Package size: $($zip.Length) bytes"
          } else {
            Write-Error 'No splinter3D-*-windows-*.zip package found'
            exit 1
          }

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            output/splinter3D-*-windows-*.zip
            output/splinter3D-*-windows-*.zip.sha256
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: windows-${{ steps.release_tag.outputs.tag }}
          body: |
            Automated Windows build for tag ${{ steps.release_tag.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
