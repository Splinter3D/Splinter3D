name: Pre-commit on PR

on:
  pull_request:
    branches:
      - dev
      - main

permissions:
  contents: read

jobs:
  pre-commit:
    if: ${{ github.head_ref != 'hotfix/release-main'  && github.head_ref != 'main'}}
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pre-commit
        run: python -m pip install --upgrade pip pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure --color=always
